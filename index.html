<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fantasy IF Linné</title>
<style>
:root {
  --bg:        #1a0508;
  --card:      #2d0d12;
  --primary:   #5C1A24;
  --hover:     #7A2433;
  --border:    #7A2433;
  --text:      #FFFFFF;
  --muted:     #E8C4CA;
  --green:     #4caf50;
  --yellow:    #ffa726;
  --red:       #e53935;
  --pitch:     #2d6e2d;
  --pitch2:    #276227;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* NAV */
#nav { display: none; background: var(--card); padding: 10px 16px; align-items: center; gap: 8px; flex-wrap: wrap; border-bottom: 2px solid var(--primary); }
#nav.visible { display: flex; }
.nav-btn { background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
.nav-btn:hover, .nav-btn.active { background: var(--primary); color: #fff; }
#nav-user { margin-left: auto; font-size: 0.8rem; color: var(--muted); }
#logout-btn { background: transparent; border: 1px solid var(--red); color: #e57373; border-radius: 20px; padding: 6px 12px; cursor: pointer; font-size: 0.8rem; }
#logout-btn:hover { background: var(--red); color: #fff; }

/* PAGE */
#page { padding: 16px; max-width: 820px; margin: 0 auto; }

/* CARDS */
.card { background: var(--card); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
.card h2 { margin-bottom: 14px; font-size: 1.1rem; color: var(--muted); }

/* WELCOME */
#welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; text-align: center; gap: 20px; }
.welcome-logo { width: 110px; height: 110px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 3.5rem; margin: 0 auto; border: 3px solid var(--hover); }
.welcome-title { font-size: 2rem; font-weight: 700; color: #fff; }
.welcome-sub { color: var(--muted); font-size: 0.95rem; }
.welcome-btns { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
.btn-primary { background: var(--primary); color: #fff; border: none; border-radius: 24px; padding: 13px 32px; font-size: 1rem; cursor: pointer; font-weight: 600; transition: background 0.2s; }
.btn-primary:hover { background: var(--hover); }
.btn-secondary { background: transparent; color: var(--muted); border: 2px solid var(--border); border-radius: 24px; padding: 11px 32px; font-size: 1rem; cursor: pointer; font-weight: 600; transition: all 0.2s; }
.btn-secondary:hover { background: var(--primary); color: #fff; }

/* FORMS */
.form-group { margin-bottom: 14px; }
.form-group label { display: block; margin-bottom: 6px; font-size: 0.85rem; color: var(--muted); }
.form-group input, .form-group select { width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.95rem; }
.form-group input:focus, .form-group select:focus { outline: none; border-color: var(--hover); }
.btn-form { background: var(--primary); color: #fff; border: none; border-radius: 8px; padding: 11px 24px; cursor: pointer; font-size: 0.95rem; font-weight: 600; width: 100%; margin-top: 4px; }
.btn-form:hover { background: var(--hover); }
.btn-back { background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: 0.9rem; margin-bottom: 16px; padding: 0; }
.btn-back:hover { color: #fff; }

/* ALERTS */
.alert { padding: 10px 14px; border-radius: 8px; margin: 10px 0; font-size: 0.9rem; }
.alert-success { background: #1b4332; color: #4caf50; border: 1px solid #4caf50; }
.alert-error { background: #4a1515; color: #e57373; border: 1px solid #e57373; }
.alert-info { background: var(--card); color: var(--muted); border: 1px solid var(--border); }

/* BADGE */
.omgång-badge { display: inline-block; background: var(--primary); color: #fff; border-radius: 20px; padding: 4px 12px; font-size: 0.8rem; margin-right: 6px; margin-bottom: 6px; }
.aktiv-badge { background: #2e7d32; }

/* STAT ROW */
.stat-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--bg); font-size: 0.9rem; }
.stat-val { color: var(--green); font-weight: 600; }

/* OMGÅNG LIST */
.omgång-item { display: grid; grid-template-columns: 1fr auto auto auto; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--bg); font-size: 0.9rem; }

/* ============================
   FOTBOLLSPLAN (MITT LAG)
   ============================ */
.pitch-wrap { position: relative; background: linear-gradient(to bottom, var(--pitch) 0%, var(--pitch2) 100%); border-radius: 12px; padding: 16px 10px; overflow: hidden; }
/* Mittlinjen */
.pitch-wrap::before { content:''; position:absolute; top:50%; left:5%; right:5%; height:2px; background:rgba(255,255,255,0.25); }
/* Mittcirkeln */
.pitch-wrap::after { content:''; position:absolute; top:50%; left:50%; width:70px; height:70px; border:2px solid rgba(255,255,255,0.2); border-radius:50%; transform:translate(-50%,-50%); }
.pitch-row { display:flex; justify-content:center; gap:10px; margin:10px 0; position:relative; z-index:1; }
.pitch-row-label { text-align:center; font-size:0.65rem; color:rgba(255,255,255,0.5); letter-spacing:1px; text-transform:uppercase; margin:2px 0; }

/* Spelarkortet på planen */
.p-slot { display:flex; flex-direction:column; align-items:center; cursor:pointer; min-width:80px; max-width:90px; }
.p-avatar { width:52px; height:52px; border-radius:50%; background:rgba(255,255,255,0.15); border:2px dashed rgba(255,255,255,0.4); display:flex; align-items:center; justify-content:center; font-size:1.3rem; position:relative; transition:all 0.2s; }
.p-avatar.filled { background:var(--primary); border:2px solid #fff; }
.p-avatar.active-pick { border:2px solid var(--yellow); background:rgba(255,167,38,0.2); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,167,38,0.4)} 50%{box-shadow:0 0 0 8px rgba(255,167,38,0)} }
.p-captain { position:absolute; top:-5px; right:-5px; background:var(--yellow); color:#000; border-radius:50%; width:18px; height:18px; font-size:0.65rem; font-weight:700; display:flex; align-items:center; justify-content:center; }
.p-name { font-size:0.7rem; color:#fff; margin-top:4px; text-align:center; font-weight:600; max-width:80px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.p-sub { font-size:0.6rem; color:rgba(255,255,255,0.7); text-align:center; }
.p-remove { font-size:0.55rem; color:#e57373; cursor:pointer; margin-top:2px; }

/* Spelare-picker under planen */
.picker-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:8px; margin-top:10px; }
.picker-card { background:var(--bg); border:1.5px solid var(--border); border-radius:8px; padding:8px; text-align:center; cursor:pointer; transition:all 0.15s; }
.picker-card:hover { border-color:var(--hover); background:var(--card); }
.picker-card.taken { opacity:0.4; pointer-events:none; }
.picker-name { font-size:0.8rem; font-weight:600; }
.picker-pos { font-size:0.65rem; color:var(--muted); }
.picker-pts { font-size:0.65rem; color:var(--green); }
.picker-price { font-size:0.65rem; color:var(--yellow); }

/* Budget bar */
.budget-bar-wrap { background:var(--bg); border-radius:8px; overflow:hidden; height:8px; margin:6px 0; }
.budget-bar { height:100%; background:var(--green); transition:width 0.3s; }
.budget-bar.warn { background:var(--yellow); }
.budget-bar.over { background:var(--red); }

/* LIGA TABLE */
.liga-table { width:100%; border-collapse:collapse; font-size:0.9rem; }
.liga-table th { background:var(--bg); padding:9px 8px; text-align:left; color:var(--muted); border-bottom:1px solid var(--border); }
.liga-table td { padding:9px 8px; border-bottom:1px solid var(--bg); }
.liga-table tr:hover td { background:#1f0709; }
.rank-1 { color:gold; font-weight:700; }
.rank-2 { color:silver; }
.rank-3 { color:#cd7f32; }

/* TABS */
.tab-bar { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
.tab-btn { background:var(--bg); border:1px solid var(--border); color:var(--muted); border-radius:20px; padding:6px 16px; cursor:pointer; font-size:0.85rem; }
.tab-btn.active { background:var(--primary); color:#fff; border-color:var(--primary); }

/* SPELARE GRID */
.spelare-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:8px; }
.spelare-card { background:var(--bg); border:1.5px solid var(--border); border-radius:10px; padding:10px; text-align:center; cursor:pointer; transition:all 0.15s; }
.spelare-card:hover { border-color:var(--hover); }
.sp-name { font-size:0.82rem; font-weight:600; margin-top:4px; }
.sp-pos { font-size:0.68rem; color:var(--muted); }
.sp-pts { font-size:0.72rem; color:var(--green); }
.sp-price { font-size:0.72rem; color:var(--yellow); }

.empty-state { text-align:center; padding:40px; color:var(--muted); }
</style>
</head>
<body>

<nav id="nav">
  <button class="nav-btn" onclick="showPage('hem')">🏠 Hem</button>
  <button class="nav-btn" onclick="showPage('mittlag')">⚽ Mitt Lag</button>
  <button class="nav-btn" onclick="showPage('senaste')">📊 Senaste omgång</button>
  <button class="nav-btn" onclick="showPage('liga')">🏆 Liga</button>
  <button class="nav-btn" onclick="showPage('spelare')">👤 Spelare</button>
  <span id="nav-user"></span>
  <button id="logout-btn" onclick="logOut()">Logga ut</button>
</nav>

<div id="page"></div>

<script>
// ─── KONFIGURATION ───────────────────────────────────────────
const APP_API_KEY    = '';
const APP_SHEET_ID   = '';
const APP_SCRIPT_URL = '';

let API_KEY    = APP_API_KEY    || localStorage.getItem('fl_api')    || '';
let SHEET_ID   = APP_SHEET_ID   || localStorage.getItem('fl_sheet')  || '';
let SCRIPT_URL = APP_SCRIPT_URL || localStorage.getItem('fl_script') || '';

// ─── STATE ───────────────────────────────────────────────────
let currentUser  = null;
let ALL_SPELARE  = [];
let ALL_LAG      = [];
let ALL_OMGÅNGAR = [];
let ALL_ANVÄNDARE= [];
let ALL_POÄNG    = [];
let AKTIV_OMGÅNG = null;

let DRAFT_LAG      = { MV:null, BACK1:null, BACK2:null, MID1:null, MID2:null, ANF:null };
let DRAFT_KAPTEN   = null;
let DRAFT_POSITION = null;

// ─── START ───────────────────────────────────────────────────
window.onload = () => {
  if (API_KEY && SHEET_ID) loadData().then(showLogin);
  else showSetup();
};

// ─── DATA ────────────────────────────────────────────────────
async function fetchSheet(range) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}?key=${API_KEY}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('Sheets-fel: ' + r.status);
  return (await r.json()).values || [];
}

async function loadData() {
  try {
    const [spRows, lagRows, omgRows, anvRows, poängRows] = await Promise.all([
      fetchSheet('Spelare!A2:G200'),
      fetchSheet('Lag!A2:N200'),
      fetchSheet('Omgångar!A2:G30'),
      fetchSheet('Användare!A2:D50'),
      fetchSheet('Spelarpoäng!A4:M500'),
    ]);

    ALL_SPELARE = spRows.filter(r => r[0] && r[0] !== 'SpelarID').map(r => ({
      id: parseInt(r[0]), namn: r[1]||'', position: r[2]||'',
      foto: r[3]||'', lag: r[4]||'', totalpoäng: parseFloat(r[5])||0, pris: parseFloat(r[6])||0,
    }));

    // A=LagID B=AnvändarID C=Användarnamn D=Email E=OmgångID F=MV G=BACK1 H=BACK2
    // I=MID1 J=MID2 K=ANF L=TotalPoäng(formel) M=Budget N=Kapten
    ALL_LAG = lagRows.filter(r => r[0] && r[0] !== 'LagID' && r[4] && !isNaN(parseInt(r[4]))).map(r => ({
      lagId: parseInt(r[0]), användarId: parseInt(r[1]), användarnamn: r[2]||'',
      email: r[3]||'', omgångId: parseInt(r[4]),
      MV: parseInt(r[5])||null, BACK1: parseInt(r[6])||null, BACK2: parseInt(r[7])||null,
      MID1: parseInt(r[8])||null, MID2: parseInt(r[9])||null, ANF: parseInt(r[10])||null,
      totalpoäng: parseFloat(r[11])||0, budget: parseFloat(r[12])||60,
      kapten: parseInt(r[13])||null,
    }));

    // A=OmgångID B=Omgång_nr C=Datum D=Deadline E=Motstånd F=Status G=Resultat
    ALL_OMGÅNGAR = omgRows.filter(r => r[0] && r[0] !== 'OmgångID').map(r => ({
      id: parseInt(r[0]), namn: 'Omgång ' + (r[1]||r[0]),
      aktiv: (r[5]||'').toLowerCase() === 'öppen',
      deadline: r[3]||'', motstånd: r[4]||'', resultat: r[6]||'',
    }));
    AKTIV_OMGÅNG = ALL_OMGÅNGAR.find(o => o.aktiv) || ALL_OMGÅNGAR[ALL_OMGÅNGAR.length-1] || null;

    ALL_ANVÄNDARE = anvRows.filter(r => r[0] && r[0] !== 'AnvändarID').map(r => ({
      userId: parseInt(r[0]), namn: r[1]||'', lagnamn: r[2]||'', email: r[3]||'',
    }));

    // A=ID B=SpelarID C=Spelarnamn D=OmgångID E=Speltid F=Mål G=Assist
    // H=HållenNolla I=GultKort J=RöttKort K=Stjärnor L=Omgångspoäng
    ALL_POÄNG = poängRows.filter(r => r[0] && r[0] !== 'ID').map(r => ({
      id: parseInt(r[0]), spelarId: parseInt(r[1]), spelarnamn: r[2]||'',
      omgångId: parseInt(r[3]),
      mål: parseInt(r[5])||0, assist: parseInt(r[6])||0,
      hållenNolla: parseInt(r[7])||0, gultKort: parseInt(r[8])||0,
      röttKort: parseInt(r[9])||0, stjärnor: parseInt(r[10])||0,
      omgångspoäng: parseFloat(r[11])||0,
    }));
  } catch(e) { console.error('loadData:', e); }
}

// ─── SETUP ───────────────────────────────────────────────────
function showSetup() {
  document.getElementById('nav').classList.remove('visible');
  document.getElementById('page').innerHTML = `
    <div style="max-width:440px;margin:0 auto;padding:32px 16px;">
      <div style="text-align:center;margin-bottom:24px;">
        <div style="font-size:3rem;">⚽</div>
        <h1 style="font-size:1.6rem;margin-top:8px;">Fantasy IF Linné</h1>
        <p style="color:var(--muted);margin-top:6px;font-size:0.9rem;">Ange anslutningsuppgifter</p>
      </div>
      <div class="card">
        <div class="form-group"><label>Google API-nyckel</label><input id="s-api" value="${API_KEY}"></div>
        <div class="form-group"><label>Google Sheets-ID</label><input id="s-sheet" value="${SHEET_ID}"></div>
        <div class="form-group"><label>Apps Script URL</label><input id="s-script" value="${SCRIPT_URL}"></div>
        <button class="btn-form" onclick="saveSetup()">Anslut</button>
      </div>
    </div>`;
}
function saveSetup() {
  API_KEY = document.getElementById('s-api').value.trim();
  SHEET_ID = document.getElementById('s-sheet').value.trim();
  SCRIPT_URL = document.getElementById('s-script').value.trim();
  localStorage.setItem('fl_api', API_KEY);
  localStorage.setItem('fl_sheet', SHEET_ID);
  localStorage.setItem('fl_script', SCRIPT_URL);
  loadData().then(showLogin);
}

// ─── INLOGGNING ───────────────────────────────────────────────
function showLogin() {
  currentUser = null;
  document.getElementById('nav').classList.remove('visible');
  document.getElementById('page').innerHTML = `
    <div id="welcome">
      <img src="logo.png" alt="IF Linné" style="width:130px;height:auto;margin:0 auto;display:block;">
      <div class="welcome-title">Fantasy IF Linné</div>
      <div class="welcome-btns">
        <button class="btn-primary" onclick="showLoginForm()">Logga in</button>
        <button class="btn-secondary" onclick="showRegister()">Skapa konto</button>
      </div>
    </div>`;
}

function showLoginForm() {
  document.getElementById('page').innerHTML = `
    <div style="max-width:400px;margin:0 auto;padding:24px 16px;">
      <button class="btn-back" onclick="showLogin()">← Tillbaka</button>
      <div class="card">
        <h2>Logga in</h2>
        <div class="form-group"><label>Lagnamn</label><input id="li-lag" type="text" autocomplete="username"></div>
        <div class="form-group"><label>Lösenord</label><input id="li-pw" type="password" autocomplete="current-password"></div>
        <div id="li-msg"></div>
        <button class="btn-form" onclick="doLogin()">Logga in</button>
      </div>
    </div>`;
  document.getElementById('li-pw').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
}

async function doLogin() {
  const lagnamn = document.getElementById('li-lag').value.trim();
  const password = document.getElementById('li-pw').value;
  const msg = document.getElementById('li-msg');
  if (!lagnamn || !password) { msg.innerHTML='<div class="alert alert-error">Fyll i alla fält.</div>'; return; }
  if (!SCRIPT_URL) { msg.innerHTML='<div class="alert alert-error">Script URL saknas.</div>'; return; }
  msg.innerHTML='<div class="alert alert-info">Loggar in...</div>';
  try {
    const d = await (await fetch(`${SCRIPT_URL}?action=loginUser&lagnamn=${enc(lagnamn)}&password=${enc(password)}`)).json();
    if (d.error) { msg.innerHTML=`<div class="alert alert-error">${esc(d.error)}</div>`; return; }
    currentUser = { userId:d.userId, namn:d.namn, lagnamn:d.lagnamn, email:d.email };
    localStorage.setItem('fl_userId', d.userId);
    updateNav(); showPage('hem');
  } catch(e) { msg.innerHTML=`<div class="alert alert-error">Fel: ${esc(e.message)}</div>`; }
}

function showRegister() {
  document.getElementById('page').innerHTML = `
    <div style="max-width:400px;margin:0 auto;padding:24px 16px;">
      <button class="btn-back" onclick="showLogin()">← Tillbaka</button>
      <div class="card">
        <h2>Skapa konto</h2>
        <div class="form-group"><label>Ditt namn</label><input id="r-namn" type="text" autocomplete="name"></div>
        <div class="form-group"><label>Lagnamn</label><input id="r-lag" type="text" autocomplete="username"></div>
        <div class="form-group"><label>E-post (valfritt)</label><input id="r-email" type="email"></div>
        <div class="form-group"><label>Lösenord</label><input id="r-pw" type="password" autocomplete="new-password"></div>
        <div class="form-group"><label>Bekräfta lösenord</label><input id="r-pw2" type="password" autocomplete="new-password"></div>
        <div id="r-msg"></div>
        <button class="btn-form" onclick="doRegister()">Skapa konto</button>
      </div>
    </div>`;
}

async function doRegister() {
  const namn=document.getElementById('r-namn').value.trim();
  const lagnamn=document.getElementById('r-lag').value.trim();
  const email=document.getElementById('r-email').value.trim();
  const pw=document.getElementById('r-pw').value;
  const pw2=document.getElementById('r-pw2').value;
  const msg=document.getElementById('r-msg');
  if(!namn||!lagnamn) { msg.innerHTML='<div class="alert alert-error">Namn och lagnamn krävs.</div>'; return; }
  if(!pw||pw.length<6) { msg.innerHTML='<div class="alert alert-error">Lösenord minst 6 tecken.</div>'; return; }
  if(pw!==pw2) { msg.innerHTML='<div class="alert alert-error">Lösenorden matchar inte.</div>'; return; }
  msg.innerHTML='<div class="alert alert-info">Skapar konto...</div>';
  try {
    const d = await (await fetch(`${SCRIPT_URL}?action=registerUser&namn=${enc(namn)}&lagnamn=${enc(lagnamn)}&email=${enc(email)}&password=${enc(pw)}`)).json();
    if(d.error) { msg.innerHTML=`<div class="alert alert-error">${esc(d.error)}</div>`; return; }
    msg.innerHTML=`<div class="alert alert-success">✅ ${esc(d.message||'Registrerad!')}</div>`;
    currentUser = { userId:d.userId, namn, lagnamn, email };
    localStorage.setItem('fl_userId', d.userId);
    await loadData();
    setTimeout(()=>{ updateNav(); showPage('hem'); }, 1000);
  } catch(e) { msg.innerHTML=`<div class="alert alert-error">Fel: ${esc(e.message)}</div>`; }
}

function logOut() {
  currentUser = null;
  localStorage.removeItem('fl_userId');
  showLogin();
}

function updateNav() {
  document.getElementById('nav').classList.add('visible');
  document.getElementById('nav-user').textContent = currentUser?.lagnamn || '';
}

// ─── ROUTING ─────────────────────────────────────────────────
function showPage(page) {
  if (!currentUser) { showLogin(); return; }
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const idx = { hem:0, mittlag:1, senaste:2, liga:3, spelare:4 };
  const btns = document.querySelectorAll('.nav-btn');
  if (idx[page] !== undefined && btns[idx[page]]) btns[idx[page]].classList.add('active');
  ({ hem:renderHem, mittlag:renderMittLag, senaste:renderSenasteOmgång, liga:renderLiga, spelare:renderSpelare }[page] || renderHem)();
}

// ─── HEM ─────────────────────────────────────────────────────
function renderHem() {
  const omg = AKTIV_OMGÅNG;
  const mitLag = omg ? ALL_LAG.find(l => l.användarId===currentUser.userId && l.omgångId===omg.id) : null;
  const omgPoäng = mitLag ? calcTotalPoäng(mitLag) : 0; // inkl. kaptensbonus för aktiv omgång
  const liga = getLigaData();
  const pos = liga.findIndex(l => l.lagnamn===currentUser.lagnamn);
  const posStr = pos>=0 ? `#${pos+1} av ${liga.length}` : '–';
  const totalt = pos>=0 ? liga[pos].totalPoäng : 0;
  const spelareValt = mitLag ? [mitLag.MV,mitLag.BACK1,mitLag.BACK2,mitLag.MID1,mitLag.MID2,mitLag.ANF].filter(Boolean).length : 0;
  const kaptenSp = mitLag?.kapten ? ALL_SPELARE.find(s=>s.id===mitLag.kapten) : null;

  document.getElementById('page').innerHTML = `
    <div class="card">
      <h2>👋 Välkommen, ${esc(currentUser.lagnamn)}!</h2>
      ${omg ? `
        <div>
          <span class="omgång-badge aktiv-badge">🟢 ${esc(omg.namn)}</span>
          ${omg.motstånd ? `<span class="omgång-badge">⚔️ vs ${esc(omg.motstånd)}</span>` : ''}
          ${omg.deadline ? `<span class="omgång-badge">🕐 ${esc(omg.deadline)}</span>` : ''}
        </div>` : '<span class="omgång-badge">Ingen aktiv omgång</span>'}
      <div class="stat-row"><span>Poäng denna omgång</span><span class="stat-val">${omgPoäng}</span></div>
      <div class="stat-row"><span>Totalpoäng</span><span class="stat-val">${totalt}</span></div>
      <div class="stat-row"><span>Ligaplacering</span><span class="stat-val">${posStr}</span></div>
      <div class="stat-row"><span>Spelare valda</span><span class="stat-val">${spelareValt}/6</span></div>
      ${kaptenSp ? `<div class="stat-row"><span>Kapten</span><span class="stat-val">⭐ ${esc(kaptenSp.namn)}</span></div>` : ''}
    </div>

    <div class="card">
      <h2>📅 Omgångar</h2>
      ${ALL_OMGÅNGAR.length===0 ? '<div class="empty-state">Inga omgångar.</div>' :
        ALL_OMGÅNGAR.map(o => `
          <div class="omgång-item">
            <span style="font-weight:600;">${esc(o.namn)}</span>
            <span style="color:var(--muted);font-size:0.85rem;">${o.motstånd ? '⚔️ '+esc(o.motstånd) : ''}</span>
            <span style="font-size:0.8rem;color:var(--muted);">${o.deadline ? '🕐 '+esc(o.deadline) : ''}</span>
            ${o.aktiv ? '<span class="omgång-badge aktiv-badge" style="font-size:0.7rem;">Aktiv</span>' : '<span></span>'}
          </div>`).join('')}
    </div>`;
}

// ─── POÄNGBERÄKNING FRÅN ALL_POÄNG ────────────────────────────
// Summerar alla 6 spelares omgångspoäng för ett lag (utan kaptensbonus)
function calcOmgångsPoäng(lagRow) {
  const positions = ['MV','BACK1','BACK2','MID1','MID2','ANF'];
  let total = 0;
  for (const pos of positions) {
    const spId = lagRow[pos]; if (!spId) continue;
    const p = ALL_POÄNG.find(x => x.spelarId===spId && x.omgångId===lagRow.omgångId);
    if (p) total += p.omgångspoäng;
  }
  return total;
}
// Lägger till kaptensbonus (kaptenens poäng räknas dubbelt)
function calcTotalPoäng(lagRow) {
  const base = calcOmgångsPoäng(lagRow);
  if (!lagRow.kapten) return base;
  const kp = ALL_POÄNG.find(p => p.spelarId===lagRow.kapten && p.omgångId===lagRow.omgångId);
  return base + (kp ? kp.omgångspoäng : 0);
}

// ─── MITT LAG (FOTBOLLSPLAN) ──────────────────────────────────
function renderMittLag() {
  const omg = AKTIV_OMGÅNG;
  if (!omg) { document.getElementById('page').innerHTML='<div class="card"><div class="empty-state">Ingen aktiv omgång.</div></div>'; return; }
  const existing = ALL_LAG.find(l => l.användarId===currentUser.userId && l.omgångId===omg.id);
  if (existing) {
    DRAFT_LAG = { MV:existing.MV, BACK1:existing.BACK1, BACK2:existing.BACK2, MID1:existing.MID1, MID2:existing.MID2, ANF:existing.ANF };
    DRAFT_KAPTEN = existing.kapten;
  } else {
    DRAFT_LAG = { MV:null, BACK1:null, BACK2:null, MID1:null, MID2:null, ANF:null };
    DRAFT_KAPTEN = null;
  }
  DRAFT_POSITION = null;
  renderPitch();
}

function renderPitch() {
  const omg = AKTIV_OMGÅNG;
  const budget = 60;
  const använt = beräknaBudget();
  const kvar = budget - använt;
  const pct = Math.min(100, (använt/budget)*100);
  const barCls = pct>100?'over':pct>85?'warn':'';

  const rows = [
    { label:'Anfallare', slots:['ANF'] },
    { label:'Mittfält',  slots:['MID1','MID2'] },
    { label:'Back',      slots:['BACK1','BACK2'] },
    { label:'Målvakt',   slots:['MV'] },
  ];

  const pitchHtml = rows.map(row => `
    <div class="pitch-row-label">${row.label}</div>
    <div class="pitch-row">
      ${row.slots.map(pos => renderSlot(pos)).join('')}
    </div>`).join('');

  const allFilled = Object.values(DRAFT_LAG).every(v => v);
  const pickerHtml = DRAFT_POSITION ? `
    <div style="margin-top:8px;" class="alert alert-info">
      Välj <strong>${posLabel(DRAFT_POSITION)}</strong>
      <button onclick="DRAFT_POSITION=null;renderPitch()" style="float:right;background:none;border:none;color:var(--muted);cursor:pointer;">✕</button>
    </div>
    <div class="picker-grid">${getSpelarePicker()}</div>` : '';

  document.getElementById('page').innerHTML = `
    <div class="card">
      <h2>⚽ Mitt Lag – ${esc(omg.namn)}</h2>
      <div style="display:flex;justify-content:space-between;font-size:0.82rem;margin-bottom:4px;">
        <span>Budget: ${använt.toFixed(1)}M / ${budget}M</span>
        <span style="color:${kvar<0?'var(--red)':'var(--green)'}">Kvar: ${kvar.toFixed(1)}M</span>
      </div>
      <div class="budget-bar-wrap"><div class="budget-bar ${barCls}" style="width:${pct}%"></div></div>

      ${allFilled ? `<div class="alert alert-info" style="margin:8px 0;font-size:0.82rem;">
        ⭐ Kapten: ${DRAFT_KAPTEN ? esc(ALL_SPELARE.find(s=>s.id===DRAFT_KAPTEN)?.namn||'') : 'Ej vald'} – klicka på en spelare på planen för att utse kapten
      </div>` : ''}

      <div class="pitch-wrap">${pitchHtml}</div>
      ${pickerHtml}
      <div id="lag-msg"></div>
      <button class="btn-form" style="margin-top:12px;" onclick="sparaLag()">💾 Spara lag</button>
    </div>`;
}

function renderSlot(pos) {
  const spId = DRAFT_LAG[pos];
  const sp = spId ? ALL_SPELARE.find(s=>s.id===spId) : null;
  const isKapten = spId && spId===DRAFT_KAPTEN;
  const isActive = DRAFT_POSITION===pos;
  if (sp) {
    return `<div class="p-slot" onclick="slotClick('${pos}')">
      <div class="p-avatar filled${isActive?' active-pick':''}">
        👤${isKapten ? '<div class="p-captain">C</div>' : ''}
      </div>
      <div class="p-name">${esc(sp.namn.split(' ')[0])}</div>
      <div class="p-sub">${sp.pris}M</div>
      <div class="p-remove" onclick="event.stopPropagation();ta_bort('${pos}')">✕ ta bort</div>
    </div>`;
  }
  return `<div class="p-slot" onclick="välj_position('${pos}')">
    <div class="p-avatar${isActive?' active-pick':''}">+</div>
    <div class="p-name" style="color:rgba(255,255,255,0.5);">${posLabel(pos)}</div>
  </div>`;
}

function slotClick(pos) {
  const spId = DRAFT_LAG[pos];
  if (!spId) { välj_position(pos); return; }
  // Utse till kapten (toggle)
  DRAFT_KAPTEN = DRAFT_KAPTEN===spId ? null : spId;
  renderPitch();
}

function välj_position(pos) { DRAFT_POSITION = DRAFT_POSITION===pos ? null : pos; renderPitch(); }
function ta_bort(pos) {
  if (DRAFT_KAPTEN===DRAFT_LAG[pos]) DRAFT_KAPTEN=null;
  DRAFT_LAG[pos]=null; DRAFT_POSITION=null; renderPitch();
}

function välj_spelare(spId) {
  if (!DRAFT_POSITION) return;
  if (Object.values(DRAFT_LAG).includes(spId)) { alert('Spelaren är redan i laget!'); return; }
  DRAFT_LAG[DRAFT_POSITION]=spId;
  DRAFT_POSITION=null;
  renderPitch();
}

function getSpelarePicker() {
  const posFilters = {
    MV:    s => /MV|GK/i.test(s.position),
    BACK1: s => /BACK|DEF|CB|RB|LB/i.test(s.position),
    BACK2: s => /BACK|DEF|CB|RB|LB/i.test(s.position),
    MID1:  s => /MID|CM|CDM|CAM|RM|LM/i.test(s.position),
    MID2:  s => /MID|CM|CDM|CAM|RM|LM/i.test(s.position),
    ANF:   s => /ANF|FW|ST|CF|LW|RW/i.test(s.position),
  };
  const fn = posFilters[DRAFT_POSITION];
  const list = (fn ? ALL_SPELARE.filter(fn) : ALL_SPELARE);
  const show = list.length>0 ? list : ALL_SPELARE;
  const taken = Object.values(DRAFT_LAG).filter(Boolean);
  return show.map(s => `
    <div class="picker-card ${taken.includes(s.id)?'taken':''}" onclick="välj_spelare(${s.id})">
      <div style="font-size:1.5rem;">👤</div>
      <div class="picker-name">${esc(s.namn)}</div>
      <div class="picker-pos">${esc(s.position)}</div>
      <div class="picker-pts">★ ${s.totalpoäng}p</div>
      <div class="picker-price">💰 ${s.pris}M</div>
    </div>`).join('');
}

function beräknaBudget() {
  return Object.values(DRAFT_LAG).reduce((sum,id) => {
    if (!id) return sum;
    return sum + (ALL_SPELARE.find(s=>s.id===id)?.pris||0);
  }, 0);
}

function posLabel(pos) {
  return {MV:'Målvakt',BACK1:'Back 1',BACK2:'Back 2',MID1:'Mittfält 1',MID2:'Mittfält 2',ANF:'Anfallare'}[pos]||pos;
}

async function sparaLag() {
  const omg = AKTIV_OMGÅNG;
  if (!omg || !currentUser) return;
  const msg = document.getElementById('lag-msg');
  if (Object.values(DRAFT_LAG).filter(Boolean).length < 6) {
    msg.innerHTML='<div class="alert alert-error">Välj alla 6 spelare.</div>'; return;
  }
  if (beräknaBudget()>60) {
    msg.innerHTML='<div class="alert alert-error">Budgeten är överskriden!</div>'; return;
  }
  if (!SCRIPT_URL) { msg.innerHTML='<div class="alert alert-error">Script URL saknas.</div>'; return; }
  msg.innerHTML='<div class="alert alert-info">Sparar...</div>';
  try {
    const p = new URLSearchParams({
      action:'saveLag', userId:currentUser.userId,
      userName:currentUser.lagnamn, userEmail:currentUser.email||'',
      omgångId:omg.id, kapten:DRAFT_KAPTEN||'',
      MV:DRAFT_LAG.MV||'', BACK1:DRAFT_LAG.BACK1||'', BACK2:DRAFT_LAG.BACK2||'',
      MID1:DRAFT_LAG.MID1||'', MID2:DRAFT_LAG.MID2||'', ANF:DRAFT_LAG.ANF||'',
    });
    const d = await (await fetch(`${SCRIPT_URL}?${p}`)).json();
    if(d.error) { msg.innerHTML=`<div class="alert alert-error">${esc(d.error)}</div>`; return; }
    msg.innerHTML='<div class="alert alert-success">✅ Laget sparat!</div>';
    await loadData();
  } catch(e) { msg.innerHTML=`<div class="alert alert-error">Fel: ${esc(e.message)}</div>`; }
}

// ─── SENASTE OMGÅNG ───────────────────────────────────────────
function renderSenasteOmgång() {
  // Hitta senaste omgång med poängdata (ej aktiv i första hand, annars den med högst ID)
  const omgångarMedData = ALL_OMGÅNGAR.filter(o =>
    ALL_POÄNG.some(p => p.omgångId === o.id)
  );
  // Föredra stängd omgång (ej aktiv), annars ta den sista med data
  const stängda = omgångarMedData.filter(o => !o.aktiv);
  const senaste = stängda.length
    ? stängda.reduce((a,b) => b.id > a.id ? b : a)
    : omgångarMedData.length
      ? omgångarMedData.reduce((a,b) => b.id > a.id ? b : a)
      : null;

  if (!senaste) {
    document.getElementById('page').innerHTML = '<div class="card"><div class="empty-state">Ingen omgång med poängdata finns ännu.</div></div>';
    return;
  }

  // Hämta alla spelarpoäng för denna omgång, sortera fallande
  const poäng = ALL_POÄNG
    .filter(p => p.omgångId === senaste.id)
    .sort((a,b) => b.omgångspoäng - a.omgångspoäng);

  const rows = poäng.map((p, i) => {
    const sp = ALL_SPELARE.find(s => s.id === p.spelarId);
    const pos = sp ? sp.position : '–';
    const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
    return `<tr>
      <td style="color:var(--muted);font-size:0.8rem;">${medal||i+1}</td>
      <td style="font-weight:600;">${esc(p.spelarnamn)}</td>
      <td style="color:var(--muted);font-size:0.82rem;">${esc(pos)}</td>
      <td style="text-align:center;">${p.mål}</td>
      <td style="text-align:center;">${p.assist}</td>
      <td style="text-align:center;">${p.hållenNolla}</td>
      <td style="text-align:center;color:var(--yellow);">${p.gultKort||''}</td>
      <td style="text-align:center;color:var(--red);">${p.röttKort||''}</td>
      <td style="text-align:center;color:var(--green);font-weight:700;">${p.omgångspoäng}</td>
    </tr>`;
  }).join('');

  document.getElementById('page').innerHTML = `
    <div class="card">
      <h2>📊 ${esc(senaste.namn)}</h2>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;">
        ${senaste.motstånd ? `<span class="omgång-badge">⚔️ vs ${esc(senaste.motstånd)}</span>` : ''}
        ${senaste.resultat ? `<span class="omgång-badge" style="background:var(--hover);">🏁 ${esc(senaste.resultat)}</span>` : ''}
      </div>
      ${poäng.length === 0
        ? '<div class="empty-state">Inga spelarpoäng registrerade.</div>'
        : `<div style="overflow-x:auto;"><table class="liga-table">
            <thead><tr>
              <th>#</th><th>Spelare</th><th>Pos</th>
              <th style="text-align:center;">Mål</th>
              <th style="text-align:center;">Ass</th>
              <th style="text-align:center;">HN</th>
              <th style="text-align:center;color:var(--yellow);">GK</th>
              <th style="text-align:center;color:var(--red);">RK</th>
              <th style="text-align:center;color:var(--green);">Poäng</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table></div>`
      }
    </div>`;
}

// ─── LIGATABELL ───────────────────────────────────────────────
function getLigaData() {
  return ALL_ANVÄNDARE.map(u => {
    const userLag = ALL_LAG.filter(l => l.användarId===u.userId);
    const totalPoäng = userLag.reduce((sum,l) => sum + calcTotalPoäng(l), 0);
    const omgångar = userLag.map(l => {
      const omg = ALL_OMGÅNGAR.find(o => o.id===l.omgångId);
      return { namn: omg ? omg.namn : `Omg ${l.omgångId}`, poäng: calcTotalPoäng(l) };
    });
    return { lagnamn:u.lagnamn, användarnamn:u.namn, totalPoäng, omgångar };
  }).sort((a,b) => b.totalPoäng - a.totalPoäng);
}

function renderLiga() {
  const data = getLigaData();
  if (!data.length) { document.getElementById('page').innerHTML='<div class="card"><div class="empty-state">Inga lag ännu.</div></div>'; return; }
  const omgNamn = [...new Set(ALL_LAG.map(l => { const o=ALL_OMGÅNGAR.find(x=>x.id===l.omgångId); return o?o.namn:`Omg ${l.omgångId}`; }))];
  const rows = data.map((l,i) => {
    const r=i+1, cls=r===1?'rank-1':r===2?'rank-2':r===3?'rank-3':'';
    const medal=r===1?'🥇':r===2?'🥈':r===3?'🥉':r;
    const me = currentUser && l.lagnamn===currentUser.lagnamn;
    const omgCells = omgNamn.map(n => { const o=l.omgångar.find(x=>x.namn===n); return `<td style="text-align:center;">${o?o.poäng:'–'}</td>`; }).join('');
    return `<tr style="${me?'background:#2d0d12;':''}">
      <td><span class="${cls}">${medal}</span></td>
      <td style="font-weight:600;">${esc(l.lagnamn)}</td>
      <td style="color:var(--muted);font-size:0.82rem;">${esc(l.användarnamn)}</td>
      ${omgCells}
      <td style="color:var(--green);font-weight:700;">${l.totalPoäng}</td>
    </tr>`;
  }).join('');
  document.getElementById('page').innerHTML = `
    <div class="card">
      <h2>🏆 Ligatabell</h2>
      <div style="overflow-x:auto;">
      <table class="liga-table">
        <thead><tr><th>#</th><th>Lag</th><th>Tränare</th>
          ${omgNamn.map(n=>`<th style="font-size:0.75rem;">${esc(n)}</th>`).join('')}
          <th style="color:var(--green);">Totalt</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>`;
}

// ─── SPELARE ──────────────────────────────────────────────────
let spelarFilter = 'Alla';
function renderSpelare() {
  const pos = ['Alla', ...new Set(ALL_SPELARE.map(s=>s.position))];
  const list = (spelarFilter==='Alla'?ALL_SPELARE:ALL_SPELARE.filter(s=>s.position===spelarFilter))
    .sort((a,b)=>b.totalpoäng-a.totalpoäng);
  document.getElementById('page').innerHTML = `
    <div class="card">
      <h2>👤 Spelare</h2>
      <div class="tab-bar">${pos.map(p=>`<button class="tab-btn ${p===spelarFilter?'active':''}" onclick="spelarFilter='${p}';renderSpelare()">${p}</button>`).join('')}</div>
      <div class="spelare-grid">${list.map(s=>`
        <div class="spelare-card" onclick="showSpelarDetalj(${s.id})">
          <div style="font-size:1.8rem;">👤</div>
          <div class="sp-name">${esc(s.namn)}</div>
          <div class="sp-pos">${esc(s.position)}</div>
          <div class="sp-pts">★ ${s.totalpoäng}p</div>
          <div class="sp-price">💰 ${s.pris}M</div>
        </div>`).join('')||'<div class="empty-state">Inga spelare.</div>'}
      </div>
    </div>`;
}

function showSpelarDetalj(id) {
  const sp = ALL_SPELARE.find(s=>s.id===id); if(!sp) return;
  const poäng = ALL_POÄNG.filter(p=>p.spelarId===id);
  document.getElementById('page').innerHTML = `
    <div class="card">
      <button class="btn-back" onclick="renderSpelare()">← Tillbaka</button>
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px;">
        <div style="font-size:3rem;">👤</div>
        <div>
          <h2 style="font-size:1.2rem;">${esc(sp.namn)}</h2>
          <div style="color:var(--muted);">${esc(sp.position)} · ${esc(sp.lag)}</div>
          <div style="color:var(--yellow);font-size:0.85rem;">💰 ${sp.pris}M</div>
        </div>
      </div>
      <div class="stat-row"><span>Totalpoäng</span><span class="stat-val">${sp.totalpoäng}</span></div>
      ${poäng.length ? `
        <h3 style="margin:14px 0 8px;color:var(--muted);">Omgångsstatistik</h3>
        <div style="overflow-x:auto;"><table class="liga-table">
          <thead><tr><th>Omgång</th><th>Mål</th><th>Assist</th><th>HN</th><th>GK</th><th>RK</th><th>Poäng</th></tr></thead>
          <tbody>${poäng.map(p=>{const o=ALL_OMGÅNGAR.find(x=>x.id===p.omgångId);return`<tr>
            <td>${o?esc(o.namn):p.omgångId}</td>
            <td>${p.mål}</td><td>${p.assist}</td><td>${p.hållenNolla}</td>
            <td>${p.gultKort}</td><td>${p.röttKort}</td>
            <td style="color:var(--green);font-weight:600;">${p.omgångspoäng}</td>
          </tr>`;}).join('')}</tbody>
        </table></div>` : '<div class="empty-state" style="padding:20px;">Ingen statistik ännu.</div>'}
    </div>`;
}

// ─── HJÄLP ────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function enc(s){ return encodeURIComponent(s||''); }
</script>
